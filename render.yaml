# Render blueprint — Python ops jobs for CanHav Research.
#
# The Next.js app deploys on Vercel and reads Upstash Redis at request/build
# time. The only Python that runs in production is the scheduled live-metrics
# refresh below; it writes to the SAME Upstash hash (canhav:store) the frontend
# reads, via DB_BACKEND=redis.
#
# Secrets (sync: false) are set in the Render dashboard, never committed:
#   REDIS_URL          Upstash 'rediss://' connection string (TCP/TLS)
#   ALCHEMY_API_KEY    Alchemy Arbitrum RPC key (live supply / TVL)
#   COINGECKO_API_KEY  optional; address + price resolution works keyless too
#
# ── One-off seed / ingest (run manually, not on a schedule) ─────────────────
# Use a Render one-off job (Dashboard → the cron service → "Run a one-off job")
# or any shell with the same env (DB_BACKEND=redis + REDIS_URL) to seed Upstash:
#   python backend/scripts/ingest_stablecoins.py
#   python backend/scripts/ingest_rwas.py
#   python backend/scripts/refresh_live.py        # resolve addresses + metrics
# This is the same as the local seed step; it only needs to run when the CSV
# changes or a fresh Upstash database is provisioned.

services:
  - type: cron
    name: canhav-refresh
    runtime: python
    # Daily at 06:00 UTC — refresh live Alchemy metrics into Upstash.
    schedule: "0 6 * * *"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/scripts/refresh_live.py --no-export
    envVars:
      - key: DB_BACKEND
        value: redis
      - key: REDIS_URL
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
